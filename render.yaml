services:
  - type: web
    name: sales-insight-automator
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health

    envVars:
      - key: GROQ_API_KEY
        sync: false

      - key: RESEND_API_KEY
        sync: false

      - key: SENDGRID_API_KEY
        sync: false

      - key: BREVO_API_KEY
        sync: false

      - key: SMTP_HOST
        value: smtp.gmail.com

      - key: SMTP_PORT
        value: "587"

      - key: SMTP_USER
        sync: false

      - key: SMTP_PASSWORD
        sync: false

      - key: SMTP_FROM_EMAIL
        sync: false

      - key: ALLOWED_ORIGINS
        value: https://frontend-alpha-one-57.vercel.app
